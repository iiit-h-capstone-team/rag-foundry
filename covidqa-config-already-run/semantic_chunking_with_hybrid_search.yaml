mode: dev
name: semantic_chunking_with_hybrid_search

cache:
  enabled: true
  cache_dir: ./cache

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: semantic
  config:
    max_words: 100
    overlap_sentences: 1
    similarity_threshold: 0.8

    embedding:
      type: sentence_transformer
      config:
        model_name: sentence-transformers/all-MiniLM-L6-v2

embedding:
  type: sentence_transformer
  config:
    model_name: BAAI/bge-large-en-v1.5
    dimension: 1024

vector_store:
  type: faiss
  config:
    dimension: 1024

retrieval:
  search:
    searches:
      - type: dense
        config:
          top_k: 20

      - type: sparse
        config:
          top_k: 20

  fusion:
    type: rrf
    config:
      k: 60

  rerank:
    type: cross_encoder
    config:
      model_name: BAAI/bge-reranker-v2-m3
      top_k: 5

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.1-8b-instant
    max_tokens: 1024
    temperature: 0.7
    system_prompt: null

evaluation:
  type: trace
  provider: groq
  config:
    model: llama-3.1-8b-instant
    max_tokens: 2000
    temperature: 0.0
