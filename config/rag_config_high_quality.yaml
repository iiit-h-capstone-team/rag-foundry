providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: sentence
  config:
    max_words: 100
    overlap_sentences: 1

embedding:
  type: sentence_transformer
  config:
    model_name: BAAI/bge-large-en-v1.5
    dimension: 1024

vector_store:
  type: faiss
  config:
    dimension: 1024

retrieval:
  type: dense_rerank
  config:
    top_k: 5
    initial_k: 20

reranker:
  type: cross_encoder
  config:
    model_name: BAAI/bge-reranker-v2-m3

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.3-70b-versatile
    max_tokens: 1024
    temperature: 0.7
    system_prompt: null

evaluation:
  type: trace
  provider: groq
  config:
    model: llama-3.3-70b-versatile
    max_tokens: 2000
    temperature: 0.0
