chunking:
  type: sentence
  max_words: 100
  overlap_sentences: 1
  params: {}

embedding:
  type: sentence_transformer
  model_name: BAAI/bge-large-en-v1.5
  dimension: 1024
  params: {}

vector_store:
  type: faiss
  dimension: 1024
  params: {}

retrieval:
  type: dense_rerank
  top_k: 5
  initial_k: 20
  dense_weight: 0.7
  sparse_weight: 0.3
  params: {}

reranker:
  type: cross_encoder
  model_name: BAAI/bge-reranker-v2-m3
  params: {}

providers:

  groq_free:
    type: groq
    api_keys:
      - ${GROQ_FREE}
    cooldown_seconds: 60

generation:
  strategy: default
  provider: groq_free
  model: llama-3.3-70b-versatile
  max_tokens: 1024
  temperature: 0.7
  system_prompt: null
  params: {}

evaluation:
  type: trace
  provider: groq_free
  model: llama-3.3-70b-versatile
  max_tokens: 2000
  temperature: 0.0
  params: {}