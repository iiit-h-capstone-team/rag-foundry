chunking:
  type: sentence
  max_words: 100
  overlap_sentences: 1
  params: {}

embedding:
  type: bge
  model_name: BAAI/bge-large-en-v1.5
  dimension: 1024
  params: {}

vector_store:
  type: faiss
  dimension: 1024
  params: {}

retrieval:
  type: dense_rerank
  top_k: 5
  initial_k: 20
  dense_weight: 0.7
  sparse_weight: 0.3
  params: {}

generation:
  type: groq
  model: llama-3.1-70b-versatile
  max_tokens: 1024
  temperature: 0.7
  system_prompt: null
  params: {}

evaluation:
  type: trace
  model: llama-3.3-70b-versatile
  max_tokens: 2000
  temperature: 0.0
  params: {}
