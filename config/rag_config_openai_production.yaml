# Production-grade example demonstrating provider-specific credential
# resolution: each provider declares its own `api_key_env`, so different
# providers read different environment variables (no hardcoded names).
mode: prod

cache:
  enabled: true
  cache_dir: ./cache

providers:
  openai:
    type: openai
    api_key_env: OPENAI_API_KEY
    params: {}
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params: {}

chunking:
  type: token
  config:
    max_tokens: 200
    overlap_tokens: 20

embedding:
  type: openai
  config:
    model: text-embedding-3-large
    dimension: 3072

vector_store:
  type: faiss
  config:
    dimension: 3072

retrieval:
  type: hybrid
  config:
    top_k: 5
    initial_k: 25
    dense_weight: 0.7
    sparse_weight: 0.3

generation:
  strategy: default
  provider: openai
  config:
    model: gpt-4
    max_tokens: 2048
    temperature: 0.3
    system_prompt: "You are a helpful assistant that answers questions based on provided context."

evaluation:
  type: trace
  provider: groq
  config:
    model: llama-3.3-70b-versatile
    max_tokens: 2000
    temperature: 0.0
