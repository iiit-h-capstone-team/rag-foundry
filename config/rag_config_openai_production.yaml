chunking:
  type: token
  max_tokens: 200
  overlap_tokens: 20
  params: {}

embedding:
  type: openai
  model: text-embedding-3-large
  dimension: 3072
  params: {}

vector_store:
  type: faiss
  dimension: 3072
  params: {}

retrieval:
  type: hybrid
  top_k: 5
  initial_k: 25
  dense_weight: 0.7
  sparse_weight: 0.3
  params: {}

generation:
  type: openai
  model: gpt-4
  max_tokens: 2048
  temperature: 0.3
  system_prompt: "You are a helpful assistant that answers questions based on provided context."
  params: {}

evaluation:
  type: trace
  model: gpt-4
  max_tokens: 2000
  temperature: 0.0
  params: {}
