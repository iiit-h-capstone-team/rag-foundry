mode: dev
name: covidqa_hyde_hybrid

cache:
  enabled: true
  cache_dir: ./cache

log_level: INFO

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: semantic
  config:
    max_words: 100
    overlap_sentences: 2
    similarity_threshold: 0.75

    embedding:
      type: sentence_transformer
      config:
        model_name: BAAI/bge-large-en-v1.5

embedding:
  type: sentence_transformer
  config:
    model_name: BAAI/bge-large-en-v1.5
    dimension: 1024

vector_store:
  type: faiss
  config:
    dimension: 1024

retrieval:
  query_transform:
    type: hyde
    provider: groq
    config:
      model: llama-3.1-8b-instant
      temperature: 0.2
      max_tokens: 256

  search:
    searches:
      - type: dense
        config:
          top_k: 40

      - type: sparse
        config:
          top_k: 40

  fusion:
    type: rrf
    config:
      k: 20

  rerank:
    type: cross_encoder
    config:
      model_name: BAAI/bge-reranker-v2-m3
      top_k: 10

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.1-8b-instant
    temperature: 0.2
    max_tokens: 1024

    system_prompt: |
      You are an expert biomedical question answering assistant.

      Answer using only the retrieved context.
      If the context is insufficient, explicitly state that the answer cannot be determined from the provided context.
      Do not use outside knowledge.
      Keep answers concise, factual and evidence-based.

    user_prompt: |
      Retrieved Context:
      --------------------
      {context}
      --------------------

      Question:
      {query}

      Answer the question using only the retrieved context.

      Answer:

evaluation:
  type: trace
  provider: groq
  config:
    model: llama-3.3-70b-versatile
    temperature: 0.0
    max_tokens: 2000

