mode: dev
name: covidqa_high_recall_hybrid_v2

cache:
  enabled: true
  cache_dir: ./cache

log_level: INFO

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: semantic
  config:
    max_words: 120
    overlap_sentences: 2
    similarity_threshold: 0.75

    embedding:
      type: sentence_transformer
      config:
        model_name: BAAI/bge-large-en-v1.5

embedding:
  type: sentence_transformer
  config:
    model_name: BAAI/bge-large-en-v1.5
    dimension: 1024

vector_store:
  type: faiss
  config:
    dimension: 1024

retrieval:
  search:
    searches:
      - type: dense
        config:
          top_k: 50

      - type: sparse
        config:
          top_k: 50

  fusion:
    type: rrf
    config:
      k: 20

  rerank:
    type: cross_encoder
    config:
      model_name: BAAI/bge-reranker-v2-m3
      top_k: 12

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.1-8b-instant
    temperature: 0.1
    max_tokens: 1024

    system_prompt: |
      You are an expert biomedical question answering assistant.

      Carefully analyze the retrieved passages before answering.

      Use only information contained in the retrieved context.
      If multiple passages contribute to the answer, synthesize them.
      If the context does not contain sufficient evidence, explicitly say so.
      Never fabricate information.

    user_prompt: |
      Retrieved Context:
      --------------------
      {context}
      --------------------

      Question:
      {query}

      Requirements:
      - Answer only from the retrieved context.
      - Be concise and precise.
      - Do not introduce unsupported information.

      Answer:

