mode: dev
name: pubmedqa_title_aware_v17_hybrid_transform

cache:
  enabled: true
  cache_dir: ./cache

log_level: INFO

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: sentence
  config:
    max_words: 200
    overlap_sentences: 1

embedding:
  type: sentence_transformer
  config:
    model_name: microsoft/BiomedNLP-PubMedBERT-base-uncased-abstract-fulltext
    dimension: 768

vector_store:
  type: faiss
  config:
    dimension: 768

retrieval:
  query_transform:
    type: multi_query
    provider: groq
    config:
      num_queries: 5
      model: llama-3.3-70b-versatile
      temperature: 0.3

  search:
    searches:
      - type: dense
        config:
          top_k: 100
          context_window: 2
          min_similarity: 0.45
      - type: sparse
        config:
          top_k: 100

  fusion:
    type: weighted_sum
    config:
      dense_weight: 0.7
      sparse_weight: 0.3

  rerank:
    type: cross_encoder
    config:
      model_name: BAAI/bge-reranker-v2-m3
      top_k: 25

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.3-70b-versatile
    temperature: 0.0
    max_tokens: 750

    system_prompt: |
      You are a biomedical question answering assistant.
      Your task is to answer questions using ONLY information from the retrieved passages.
      
      CRITICAL RULES (MUST FOLLOW ALL):
      1. Answer ONLY from the passages provided. Do not use external knowledge.
      2. Include ALL relevant details, findings, statistics, and information from the passages.
      3. Be thorough and comprehensive — aim for 175-250 words to cover all relevant aspects.
      4. Do NOT add phrases like "based on general knowledge", "it is well-established", "it is known that", or "research shows".
      5. Do NOT hedge or qualify your answer with "may", "might", "could", "possibly", "suggests", "indicates" unless explicitly stated in passages.
      6. If the passages do not contain enough information, respond with: "The passages do not provide sufficient information to answer this question."
      7. Do NOT say "The passages do not contain..." or similar variations — use the exact phrase above.
      8. Use multiple passages to build a comprehensive answer that addresses all aspects of the question.
      9. Every claim must be directly traceable to the passages provided.
      10. Do NOT add interpretations, conclusions, or inferences not explicitly stated in the passages.

    user_prompt: |
      Passages:
      {context}

      Question: {query}

      Answer (from passages only, include ALL relevant details, findings, and information):
