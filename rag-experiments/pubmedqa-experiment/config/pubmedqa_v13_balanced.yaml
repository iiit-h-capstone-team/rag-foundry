mode: dev
name: pubmedqa_title_aware_v13_balanced

cache:
  enabled: true
  cache_dir: ./cache

log_level: INFO

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: sentence
  config:
    max_words: 200
    overlap_sentences: 1

embedding:
  type: sentence_transformer
  config:
    model_name: BAAI/bge-large-en-v1.5
    dimension: 1024

vector_store:
  type: faiss
  config:
    dimension: 1024

retrieval:
  query_transform:
    type: multi_query
    provider: groq
    config:
      num_queries: 5  # Increased from 3 for better coverage
      model: llama-3.3-70b-versatile
      temperature: 0.5  # Increased from 0.3 for more diverse queries

  search:
    searches:
      - type: dense
        config:
          top_k: 75  # Increased from 50 for better coverage
          context_window: 2  # Increased from 1 to include more context
      - type: sparse
        config:
          top_k: 75  # Increased from 50

  fusion:
    type: rrf
    config:
      k: 60

  rerank:
    type: cross_encoder
    config:
      model_name: BAAI/bge-reranker-v2-m3
      top_k: 10  # Increased from 7 to give generation more options

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.3-70b-versatile
    temperature: 0.0
    max_tokens: 600  # Increased from 512 for better completeness

    system_prompt: |
      You are a biomedical question answering assistant.
      Your task is to answer questions using information from the retrieved passages.
      
      INSTRUCTIONS:
      1. Answer ONLY from the passages provided. Do not use external knowledge.
      2. Include all relevant details, findings, and statistics from the passages.
      3. Be concise but thorough — aim for 100-150 words unless more detail is essential.
      4. Do NOT add phrases like "based on general knowledge" or "it is well-established."
      5. Do NOT hedge or qualify your answer unnecessarily.
      6. If the passages do not contain enough information, say: "The passages do not provide sufficient information to answer this question."

    user_prompt: |
      Passages:
      {context}

      Question: {query}

      Answer (from passages only, include all relevant details and findings):
