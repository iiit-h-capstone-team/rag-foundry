mode: dev
name: ollama_embedding

cache:
  enabled: true
  cache_dir: ./cache

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: fixed_word
  config:
    max_words: 100
    overlap_words: 10

embedding:
  type: ollama
  config:
    model_name: nomic-embed-text
    dimension: 768
    base_url: http://localhost:11434

vector_store:
  type: faiss
  config:
    dimension: 768

retrieval:
  search:
    searches:
      - type: dense
        config:
          top_k: 5

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.1-8b-instant
    max_tokens: 1024
    temperature: 0.7
    system_prompt: null

evaluation:
  type: trace
  provider: groq
  config:
    model: llama-3.1-8b-instant
    max_tokens: 2000
    temperature: 0.0
