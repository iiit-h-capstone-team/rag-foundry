mode: dev
name: huggingface_embedding

cache:
  enabled: true
  cache_dir: ./cache

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: token
  config:
    max_tokens: 100
    overlap_tokens: 10

embedding:
  type: huggingface
  config:
    model_name: sentence-transformers/all-MiniLM-L6-v2
    dimension: 384
    api_url: null

vector_store:
  type: faiss
  config:
    dimension: 384

retrieval:
  type: dense
  config:
    top_k: 5

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.1-8b-instant
    max_tokens: 1024
    temperature: 0.7
    system_prompt: null

evaluation:
  type: trace
  provider: groq
  config:
    model: llama-3.1-8b-instant
    max_tokens: 2000
    temperature: 0.0
