config_dir: config

cache_dir: cache

report_dir: reports

temp_dir: temp

# Query range configuration
start_index: 0
end_index: 246

# Parallel execution configuration
parallel: false
max_workers: 1

# Data loading configuration
data_loader:
  type: huggingface
  config:
    dataset_name: galileo-ai/ragbench
    subset: covidqa
    split: test
    limit: 246

# Data parser configuration
data_parser: title_passage

# Report configuration
report_strategy: detailed_query