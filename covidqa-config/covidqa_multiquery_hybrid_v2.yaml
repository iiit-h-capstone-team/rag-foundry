mode: dev
name: covidqa_multiquery_hybrid_v2

cache:
  enabled: true
  cache_dir: ./cache

log_level: INFO

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: semantic
  config:
    max_words: 90
    overlap_sentences: 3
    similarity_threshold: 0.70

    embedding:
      type: sentence_transformer
      config:
        model_name: BAAI/bge-large-en-v1.5

embedding:
  type: sentence_transformer
  config:
    model_name: BAAI/bge-large-en-v1.5
    dimension: 1024

vector_store:
  type: faiss
  config:
    dimension: 1024

retrieval:
  query_transform:
    type: multi_query
    provider: groq
    config:
      model: llama-3.1-8b-instant
      num_queries: 3
      temperature: 0.0
      max_tokens: 192

  search:
    searches:
      - type: dense
        config:
          top_k: 60

      - type: sparse
        config:
          top_k: 60

  fusion:
    type: rrf
    config:
      k: 60

  rerank:
    type: cross_encoder
    config:
      model_name: BAAI/bge-reranker-v2-m3
      top_k: 15

generation:
  strategy: default
  provider: groq
  config:
    model: llama-3.3-70b-versatile
    temperature: 0.0
    max_tokens: 512

    system_prompt: |
      You are an expert biomedical question answering assistant.

      Answer ONLY using the retrieved context.

      If the answer cannot be determined from the retrieved passages,
      reply exactly:

      "Insufficient evidence in retrieved context."

      Do not use outside medical knowledge.
      Prefer precise, evidence-based answers.
      Keep answers concise.

    user_prompt: |
      Retrieved Context
      -----------------
      {context}
      -----------------

      Question:
      {query}

      Answer using only the retrieved context.