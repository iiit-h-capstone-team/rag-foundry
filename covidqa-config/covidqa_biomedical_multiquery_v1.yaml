mode: dev
name: covidqa_biomedical_multiquery_v1

cache:
  enabled: true
  cache_dir: ./cache

log_level: INFO

providers:
  groq:
    type: groq
    api_key_env: GROQ_API_KEY
    params:
      cooldown_seconds: 60

chunking:
  type: token
  config:
    max_tokens: 120
    overlap_tokens: 20

embedding:
  type: sentence_transformer
  config:
    model_name: pritamdeka/S-PubMedBert-MS-MARCO
    dimension: 768

vector_store:
  type: faiss
  config:
    dimension: 768

retrieval:

  query_transform:
    type: multi_query
    provider: groq
    config:
      model: qwen/qwen3-32b
      num_queries: 3
      temperature: 0.0
      max_tokens: 192

  search:
    searches:

      - type: dense
        config:
          top_k: 80

      - type: sparse
        config:
          top_k: 80

  fusion:
    type: rrf
    config:
      k: 60

  rerank:
    type: cross_encoder
    config:
      model_name: BAAI/bge-reranker-v2-gemma
      top_k: 15

generation:
  strategy: default
  provider: groq

  config:
    model: qwen/qwen3-32b
    temperature: 0.0
    max_tokens: 512

    system_prompt: |
      You are an expert biomedical question answering assistant.

      Answer ONLY using the retrieved context.

      Do not use prior knowledge.

      If the answer cannot be determined from the retrieved context,
      reply exactly:

      "Insufficient evidence in retrieved context."

      Keep answers concise, factual and evidence-based.

    user_prompt: |
      Retrieved Context
      -----------------
      {context}
      -----------------

      Question:
      {query}

      Answer using only the retrieved context.